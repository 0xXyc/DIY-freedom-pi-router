# IP forwarding, required for this box to actually route.
net.ipv4.ip_forward=1

# Anti-spoof. rp_filter=2 drops inbound packets whose source IP has no
# route back. Strict mode (1) can break asymmetric paths, loose (2) is
# the safe router default.
net.ipv4.conf.all.rp_filter=2
net.ipv4.conf.default.rp_filter=2

# Source-routed packets are basically only useful for spoofing. Drop.
net.ipv4.conf.all.accept_source_route=0
net.ipv4.conf.default.accept_source_route=0
net.ipv6.conf.all.accept_source_route=0
net.ipv6.conf.default.accept_source_route=0

# ICMP redirects let someone rewrite your routing table. A router
# should work out its own routes, not trust hints from the network.
net.ipv4.conf.all.accept_redirects=0
net.ipv4.conf.default.accept_redirects=0
net.ipv6.conf.all.accept_redirects=0
net.ipv6.conf.default.accept_redirects=0

# Don't send redirects either.
net.ipv4.conf.all.send_redirects=0
net.ipv4.conf.default.send_redirects=0

# SYN cookies, for when someone tries to SYN flood the box.
net.ipv4.tcp_syncookies=1

# Don't answer pings sent to a broadcast address (smurf attack).
net.ipv4.icmp_echo_ignore_broadcasts=1

# Log packets with impossible source IPs. Shows up in dmesg.
net.ipv4.conf.all.log_martians=1

# TCP tuning for a gigabit WAN.
net.core.rmem_max=16777216
net.core.wmem_max=16777216
net.core.netdev_max_backlog=5000
net.ipv4.tcp_rmem=4096 87380 16777216
net.ipv4.tcp_wmem=4096 65536 16777216
net.core.default_qdisc=fq
net.ipv4.tcp_congestion_control=bbr

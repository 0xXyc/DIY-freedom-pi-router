# SSH hardening.
# Lands at /etc/ssh/sshd_config.d/99-freedom-pi.conf. sshd reads drop-ins
# and the first match for a directive wins, so the filename has to come
# before anything else in sshd_config.d. Fresh Pi OS doesn't ship any
# others, so 99- is fine.

# No root logins at all. Use your normal user + sudo.
PermitRootLogin no

# Default is 6. That's too generous.
MaxAuthTries 3

# Key-only auth. The installer comments this line out automatically if
# it can't find an authorized_keys file, so you can't lock yourself out.
PasswordAuthentication no
